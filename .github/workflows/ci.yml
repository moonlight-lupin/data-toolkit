name: CI

permissions:
  contents: write

# Quality gate for the Data Toolkit: authoring lint + finance-grade engine and
# agent-runtime regression suites on every push and PR to main.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Authoring lint (manifest, SKILL.md, engine self-tests)
        run: python bin/data-lint

      - name: Engine regression suite
        run: python tests/test_engine.py

      - name: Agent runtime regression suite
        shell: bash
        run: |
          set +e
          python tests/test_agent_runtime.py > agent-runtime-test.log 2>&1
          status=$?
          cat agent-runtime-test.log
          exit $status

      - name: Upload agent runtime failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: agent-runtime-failure-${{ matrix.python-version }}
          path: agent-runtime-test.log
          retention-days: 7

      - name: Quickstart smoke (recon + dashboard)
        run: python examples/run_quickstart.py

  apply-priority-2-3:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/schema-fast-path-priority-2-3
          fetch-depth: 0

      - name: Apply reviewed implementation patch
        run: |
          base64 --decode .maintainer/priority23.patch.gz.b64 | gzip --decompress > /tmp/priority23.patch
          git apply --check /tmp/priority23.patch
          git apply /tmp/priority23.patch
          rm -rf .maintainer

      - name: Commit product implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: validate agent specs and add fast path"
          git push origin HEAD:agent/schema-fast-path-priority-2-3
