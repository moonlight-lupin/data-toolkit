name: CI

# Quality gate for the Data Toolkit: authoring lint + finance-grade engine,
# agent-runtime and schema regression suites on every push and PR to main.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Optional extras exercised by the engine suite (large-file + image extract + pptx).
          # Soft deps: tests skip cleanly when absent; CI installs them for coverage.
          pip install "pandas>=2.0.0" "pyarrow>=14.0.0" "Pillow>=10.0.0" "requests>=2.28.0" "python-pptx>=0.6.21"

      - name: Authoring lint (manifest, SKILL.md, engine self-tests)
        run: python bin/data-lint

      - name: Engine regression suite
        run: python tests/test_engine.py

      - name: Agent runtime regression suite
        shell: bash
        run: |
          set +e
          python tests/test_agent_runtime.py > agent-runtime-test.log 2>&1
          status=$?
          cat agent-runtime-test.log
          exit $status

      - name: Agent schema regression suite
        run: python tests/test_agent_schemas.py

      - name: Upload agent runtime failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: agent-runtime-failure-${{ matrix.python-version }}
          path: agent-runtime-test.log
          retention-days: 7

      - name: Quickstart smoke (recon + dashboard)
        run: python examples/run_quickstart.py
